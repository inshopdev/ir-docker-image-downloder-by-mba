name: Save Docker Image

on:
  workflow_dispatch:
    inputs:
      image:
        description: "Docker image name, for example nginx:alpine"
        required: true
        type: string
      output_name:
        description: "Optional output name. Leave empty to generate from image name."
        required: false
        type: string
        default: ""
      platform:
        description: "Target image platform"
        required: true
        type: choice
        default: linux/amd64
        options:
          - linux/amd64
          - linux/arm64
          - linux/arm/v7
          - linux/arm/v6
          - linux/386
          - linux/ppc64le
          - linux/s390x
          - linux/riscv64
      registry_login:
        description: "Login to a private registry before pulling"
        required: true
        type: boolean
        default: false
      registry:
        description: "Registry host for private images, for example ghcr.io"
        required: false
        type: string
        default: "ghcr.io"
      compression:
        description: "Compression method"
        required: true
        type: choice
        default: none
        options:
          - none
          - zstd
          - gzip
          - xz
      zstd_level:
        description: "Zstd compression level, 1-19"
        required: true
        type: string
        default: "10"
      split_size_mb:
        description: "Split files larger than this size in MB"
        required: true
        type: string
        default: "95"
      commit_to_repo:
        description: "Commit generated files to this repository"
        required: true
        type: boolean
        default: true
      create_release:
        description: "Create a GitHub Release with a ready-to-use zip"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  save-image:
    name: Save image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd pigz xz-utils zip

      - name: Prepare scripts
        run: chmod +x scripts/*.sh

      - name: Validate inputs
        shell: bash
        env:
          COMMIT_TO_REPO: ${{ inputs.commit_to_repo }}
          SPLIT_SIZE_MB: ${{ inputs.split_size_mb }}
          REGISTRY_LOGIN: ${{ inputs.registry_login }}
          REGISTRY: ${{ inputs.registry }}
        run: |
          set -euo pipefail
          if ! [[ "$SPLIT_SIZE_MB" =~ ^[0-9]+$ ]]; then
            echo "split_size_mb must be a number."
            exit 1
          fi
          if [ "$COMMIT_TO_REPO" = "true" ] && [ "$SPLIT_SIZE_MB" -gt 95 ]; then
            echo "split_size_mb must stay at 95 or lower when commit_to_repo is true."
            echo "GitHub rejects normal git files larger than 100MB."
            exit 1
          fi
          if [ "$REGISTRY_LOGIN" = "true" ] && ! [[ "$REGISTRY" =~ ^[A-Za-z0-9._:-]+$ ]]; then
            echo "registry must be a registry host like ghcr.io, registry.example.com, or localhost:5000."
            exit 1
          fi

      - name: Login to private registry
        if: ${{ inputs.registry_login }}
        shell: bash
        env:
          REGISTRY: ${{ inputs.registry }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$REGISTRY" ]; then
            echo "registry is required when registry_login is enabled."
            exit 1
          fi
          if [ -z "$REGISTRY_USERNAME" ] || [ -z "$REGISTRY_TOKEN" ]; then
            echo "REGISTRY_USERNAME and REGISTRY_TOKEN repository secrets are required when registry_login is enabled."
            echo "For GHCR private images, use a GitHub token with read:packages access."
            exit 1
          fi
          echo "$REGISTRY_TOKEN" | docker login "$REGISTRY" -u "$REGISTRY_USERNAME" --password-stdin

      - name: Save Docker image
        env:
          IMAGE_INPUT: ${{ inputs.image }}
          OUTPUT_NAME_INPUT: ${{ inputs.output_name }}
          PLATFORM: ${{ inputs.platform }}
          COMPRESSION: ${{ inputs.compression }}
          ZSTD_LEVEL: ${{ inputs.zstd_level }}
          SPLIT_SIZE_MB: ${{ inputs.split_size_mb }}
        run: |
          ./scripts/save-image.sh "$IMAGE_INPUT" "$OUTPUT_NAME_INPUT"

      - name: Build release package
        if: ${{ inputs.create_release }}
        id: package
        shell: bash
        run: |
          set -euo pipefail
          manifest="$(find docker-images -type f -name '*.manifest.json' -printf '%T@ %p\n' | sort -nr | head -n 1 | cut -d' ' -f2-)"
          base="$(basename "$manifest" .manifest.json)"
          image_dir="$(dirname "$manifest")"
          package_dir=".tmp/docker-backup-${base}"
          zip_name="docker-backup-${base}.zip"

          rm -rf "$package_dir"
          mkdir -p "$package_dir/docker-images" "$package_dir/scripts"

          cp README.md QUICK_START.md "$package_dir/"
          cp scripts/restore-linux.sh scripts/restore-mac.sh scripts/restore-windows.ps1 "$package_dir/scripts/"
          mkdir -p "$package_dir/${image_dir}"
          cp "${image_dir}/${base}"* "$package_dir/${image_dir}/"
          cp "${image_dir}/README.md" "$package_dir/${image_dir}/"
          cp "${image_dir}/VERSION.txt" "$package_dir/${image_dir}/"

          (cd ".tmp" && zip -r "../${zip_name}" "docker-backup-${base}")

          echo "base=${base}" >> "$GITHUB_OUTPUT"
          echo "image_dir=${image_dir}" >> "$GITHUB_OUTPUT"
          echo "zip_name=${zip_name}" >> "$GITHUB_OUTPUT"
          echo "package_dir=${package_dir}" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        if: ${{ inputs.create_release }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.base }}
          path: |
            ${{ steps.package.outputs.zip_name }}
            ${{ steps.package.outputs.image_dir }}/${{ steps.package.outputs.base }}*
            ${{ steps.package.outputs.image_dir }}/README.md
            ${{ steps.package.outputs.image_dir }}/VERSION.txt

      - name: Commit generated files
        if: ${{ inputs.commit_to_repo }}
        shell: bash
        env:
          IMAGE_INPUT: ${{ inputs.image }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .gitattributes docker-images/
          if git diff --cached --quiet; then
            echo "No generated files to commit."
          else
            git commit -m "Add Docker image backup for ${IMAGE_INPUT}"
            git push
          fi

      - name: Create GitHub Release
        if: ${{ inputs.create_release }}
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_INPUT: ${{ inputs.image }}
        shell: bash
        run: |
          set -euo pipefail
          tag="backup-${{ steps.package.outputs.base }}-${{ github.run_number }}"
          title="Docker backup: ${IMAGE_INPUT}"
          body_file=".tmp/release-notes.md"

          cat > "$body_file" <<EOF
          Docker image backup for:

          \`${IMAGE_INPUT}\`

          Download the ZIP, extract it, then run the restore script for your OS.
          See \`QUICK_START.md\` inside the ZIP.
          EOF

          gh release create "$tag" "${{ steps.package.outputs.zip_name }}" \
            --title "$title" \
            --notes-file "$body_file"
